<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ScribeMind AI</title>
    <meta name="description" content="Generate SEO-friendly blog ideas instantly.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; padding: 20px; background-color: #f8fafc; color: #334155; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { background-color: #ffffff; padding: 25px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; width: 100%; text-align: center; }
        h1 { color: #1e293b; margin-bottom: 20px; font-size: 1.8rem; }
        p { margin-bottom: 25px; line-height: 1.5; color: #475569; }
        input[type="text"] { width: calc(100% - 22px); padding: 10px; margin-bottom: 15px; border: 1px solid #cbd5e1; border-radius: 5px; font-size: 1rem; }
        button { background-color: #3b82f6; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; transition: background-color 0.2s; }
        button:hover { background-color: #2563eb; }
        #results { margin-top: 25px; text-align: left; background-color: #f1f5f9; padding: 20px; border-radius: 5px; min-height: 100px; white-space: pre-wrap; word-wrap: break-word; color: #334155; }
        .price { font-weight: 600; color: #10b981; margin-top: 20px; font-size: 1.1rem;}
    </style>
</head>
<body>
    <div class="container">
        <h1>ScribeMind AI</h1>
        <p>Generate fresh, SEO-friendly blog post ideas instantly from a keyword or topic. Perfect for bloggers and content creators.</p>
        <input type="text" id="keywordInput" placeholder="e.g., 'sustainable living', 'remote work productivity'">
        <button id="generateBtn">Get Ideas</button>
        <div id="results">Your blog ideas will appear here...</div>
        <p class="price">Get ideas for just $0.99 per generation.</p>
    </div>
    <script>
        document.getElementById('generateBtn').addEventListener('click', async () => {
            const keyword = document.getElementById('keywordInput').value;
            const resultsDiv = document.getElementById('results');
            if (!keyword) {
                resultsDiv.textContent = 'Please enter a keyword to generate ideas.';
                return;
            }
            resultsDiv.textContent = 'Generating ideas...';
            try {
                // In a real app, this would call a backend serverless function
                // const response = await fetch('/api/generate-ideas', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ keyword }) });
                // const data = await response.json();
                // resultsDiv.textContent = data.ideas.join('\n');

                // Mockup for demo: simulate API call
                await new Promise(resolve => setTimeout(resolve, 2000));
                resultsDiv.textContent = `1. The Ultimate Guide to ${keyword} (SEO-Optimized)
2. 5 Surprising Benefits of Embracing ${keyword} Today
3. How ${keyword} Can Transform Your Daily Routine
4. Debunking Myths About ${keyword}: What You Need to Know
5. Top 10 Tools and Resources for ${keyword} Enthusiasts`;
            } catch (error) {
                resultsDiv.textContent = 'Failed to generate ideas. Please try again.';
                console.error(error);
            }
        });
    </script>
</body>
</html>
