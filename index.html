<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Idea AI</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md">
        <h1 class="text-3xl font-bold mb-4 text-center text-gray-800">Blog Idea AI</h1>
        <p class="text-gray-600 mb-6 text-center">Input a keyword, get fresh blog post ideas!</p>

        <input type="text" id="keywordInput" placeholder="e.g., 'sustainable living'" class="w-full px-4 py-3 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 mb-4">
        
        <button id="generateBtn" class="w-full bg-blue-600 text-white py-3 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition duration-200">
            Generate Ideas
        </button>

        <div id="results" class="mt-6 space-y-4">
            <!-- AI generated ideas will appear here -->
        </div>

        <div id="loadingIndicator" class="text-center text-gray-500 mt-4 hidden">Generating...</div>

        <p class="text-sm text-gray-400 text-center mt-8">Powered by OpenAI. Purchase unlocks full features.</p>
    </div>

    <script>
        const keywordInput = document.getElementById('keywordInput');
        const generateBtn = document.getElementById('generateBtn');
        const resultsDiv = document.getElementById('results');
        const loadingIndicator = document.getElementById('loadingIndicator');

        generateBtn.addEventListener('click', async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                alert('Please enter a keyword!');
                return;
            }
            resultsDiv.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            generateBtn.disabled = true;

            try {
                // This is a placeholder for a real API call. 
                // In a real app, this would hit your backend to call OpenAI and handle payment.
                const dummyIdeas = [
                    { title: `The Future of ${keyword}: 5 Trends to Watch`, description: `Explore emerging trends and their impact.` },
                    { title: `Beginner's Guide to ${keyword}: Everything You Need to Know`, description: `Comprehensive introduction to the topic.` },
                    { title: `Mastering ${keyword}: Advanced Techniques`, description: `Dive into expert-level strategies and tips.` }
                ];
                
                await new Promise(resolve => setTimeout(resolve, 2000)); // Simulate API delay

                dummyIdeas.forEach(idea => {
                    const ideaElement = document.createElement('div');
                    ideaElement.className = 'p-4 border rounded-md border-gray-200 bg-gray-50';
                    ideaElement.innerHTML = `<h3 class="font-semibold text-lg text-gray-700">${idea.title}</h3><p class="text-gray-600 text-sm mt-1">${idea.description}</p>`;
                    resultsDiv.appendChild(ideaElement);
                });

            } catch (error) {
                console.error('Error generating ideas:', error);
                resultsDiv.innerHTML = '<p class="text-red-500 text-center">Failed to generate ideas. Please try again later.</p>';
            } finally {
                loadingIndicator.classList.add('hidden');
                generateBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
