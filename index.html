<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog AIdea Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
        <h1 class="text-3xl font-bold mb-6 text-center text-gray-800">Blog AIdea Generator</h1>
        <p class="mb-6 text-center text-gray-600">Unlock fresh blog post ideas instantly!</p>
        <input type="text" id="keywordInput" placeholder="Enter a keyword or topic (e.g., 'sustainable living')" class="w-full p-3 mb-4 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
        <button id="generateButton" class="w-full bg-blue-600 text-white p-3 rounded-md hover:bg-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500">
            Generate Ideas
        </button>
        <div id="loadingIndicator" class="text-center mt-4 text-gray-500 hidden">
            Generating ideas...
        </div>
        <div id="ideasOutput" class="mt-6 space-y-3">
            <!-- Ideas will be displayed here -->
        </div>
        <p class="mt-8 text-center text-gray-500 text-sm">Powered by AI</p>
    </div>

    <script>
        const keywordInput = document.getElementById('keywordInput');
        const generateButton = document.getElementById('generateButton');
        const ideasOutput = document.getElementById('ideasOutput');
        const loadingIndicator = document.getElementById('loadingIndicator');

        generateButton.addEventListener('click', async () => {
            const keyword = keywordInput.value.trim();
            if (!keyword) {
                alert('Please enter a keyword or topic.');
                return;
            }

            ideasOutput.innerHTML = '';
            loadingIndicator.classList.remove('hidden');
            generateButton.disabled = true; 

            try {
                // In a real app, this would hit a secure backend API route
                // For demo, simulating an API call
                const response = await new Promise(resolve => setTimeout(() => {
                    const mockIdeas = [
                        `Explore the top 5 essential habits for sustainable living at home.`, 
                        `Guide: How to start composting for beginners and reduce waste effectively.`, 
                        `Interview with an expert: The future of eco-friendly fashion.`, 
                        `Debunking myths: Common misconceptions about going green.`, 
                        `Product review: Must-have sustainable gadgets for your everyday life.`
                    ];
                    resolve({ success: true, ideas: mockIdeas });
                }, 2000));

                if (response.success) {
                    response.ideas.forEach(idea => {
                        const p = document.createElement('p');
                        p.className = 'bg-blue-50 p-3 rounded-md text-gray-700 border border-blue-200';
                        p.textContent = idea;
                        ideasOutput.appendChild(p);
                    });
                } else {
                    ideasOutput.innerHTML = '<p class="text-red-500 text-center">Error generating ideas. Please try again.</p>';
                }
            } catch (error) {
                ideasOutput.innerHTML = '<p class="text-red-500 text-center">An unexpected error occurred.</p>';
                console.error(error);
            } finally {
                loadingIndicator.classList.add('hidden');
                generateButton.disabled = false;
            }
        });
    </script>
</body>
</html>
